<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RENN MODZ</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0a0a0a',
                        glass: 'rgba(30, 30, 30, 0.6)',
                        accent: '#8B5CF6', /* Violet Premium */
                        secondary: '#A78BFA'
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        /* --- CORE CSS (ANTI LAG) --- */
        body {
            background-color: #050505;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.15) 0%, transparent 40%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* GLASS EFFECT YANG RINGAN */
        .glass-card {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }
        
        .glass-header {
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        /* SCROLLBAR HIDING */
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        /* ANIMASI KLIK */
        .active-scale:active { transform: scale(0.96); }

        /* NEON TEXT */
        .neon-text {
            text-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
        }
    </style>
</head>
<body class="pb-24">

    <nav class="fixed top-0 w-full z-50 glass-header px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
    <div class="w-10 h-10 rounded-xl bg-accent/20 flex items-center justify-center border border-accent/30 overflow-hidden">
        <img src="https://files.catbox.moe/2zgdzu.jpg" class="w-full h-full object-cover" alt="Logo">
    </div>
    
    <div>
        <h1 class="font-bold text-sm tracking-wide">RENN MODZ</h1>
        <p class="text-[10px] text-green-400 font-mono tracking-widest">● ONLINE</p>
    </div>
</div>
        <button onclick="App.reset()" class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-white/50 hover:text-white">
            <i class="fa-solid fa-rotate-right"></i>
        </button>
    </nav>

    <header class="mt-28 px-6 mb-8 text-center">
        <h2 class="text-3xl font-bold mb-2 neon-text">RENN MODZ</h2>
        <p class="text-xs text-white/40 max-w-xs mx-auto">Solusi digital terbaik untuk kebutuhan server & gaming</p>
    </header>

    <div class="px-6 mb-8">
        <div class="grid grid-cols-4 gap-3">
            <button onclick="App.show('panel')" class="flex flex-col items-center gap-2 group">
                <div class="w-14 h-14 rounded-2xl glass-card flex items-center justify-center text-2xl text-accent border-accent/20 group-hover:bg-accent group-hover:text-white transition-all">
                    <i class="fa-solid fa-server"></i>
                </div>
                <span class="text-[10px] font-bold uppercase text-white/60">PANEL HOSTING</span>
            </button>
            
            <button onclick="App.show('topup')" class="flex flex-col items-center gap-2 group">
                <div class="w-14 h-14 rounded-2xl glass-card flex items-center justify-center text-2xl text-blue-400 border-blue-500/20 group-hover:bg-blue-500 group-hover:text-white transition-all">
                    <i class="fa-solid fa-gamepad"></i>
                </div>
                <span class="text-[10px] font-bold uppercase text-white/60">TOP UP</span>
            </button>

            <button onclick="App.show('vps')" class="flex flex-col items-center gap-2 group">
                <div class="w-14 h-14 rounded-2xl glass-card flex items-center justify-center text-2xl text-pink-400 border-pink-500/20 group-hover:bg-pink-500 group-hover:text-white transition-all">
                    <i class="fa-solid fa-cloud"></i>
                </div>
                <span class="text-[10px] font-bold uppercase text-white/60">DROPLET VPS</span>
            </button>

            <button onclick="App.show('bot')" class="flex flex-col items-center gap-2 group">
                <div class="w-14 h-14 rounded-2xl glass-card flex items-center justify-center text-2xl text-green-400 border-green-500/20 group-hover:bg-green-500 group-hover:text-white transition-all">
                    <i class="fa-brands fa-whatsapp"></i>
                </div>
                <span class="text-[10px] font-bold uppercase text-white/60">SEWA BOT</span>
            </button>
        </div>
    </div>

    <main id="content-area" class="px-6 min-h-[50vh]">
        </main>

    <div id="order-modal" class="fixed inset-0 z-[60] bg-black/90 hidden items-end sm:items-center justify-center backdrop-blur-sm transition-all">
        <div class="w-full sm:max-w-md bg-[#111] rounded-t-[2rem] sm:rounded-[2rem] border-t border-white/10 p-6 pb-10 animate-[slideUp_0.3s_ease-out]">
            <div class="w-12 h-1 bg-white/10 rounded-full mx-auto mb-6"></div>
            
            <div class="flex items-start gap-4 mb-6">
                <div id="modal-icon" class="w-12 h-12 rounded-xl bg-accent/10 flex items-center justify-center text-accent text-xl">
                    <i class="fa-solid fa-cart-shopping"></i>
                </div>
                <div>
                    <h3 id="modal-title" class="font-bold text-lg text-white">Product Name</h3>
                    <p id="modal-price" class="text-accent font-mono font-bold">Rp 0</p>
                </div>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-[10px] uppercase font-bold text-white/40 tracking-widest mb-2 block">Data Pesanan</label>
                    <input type="text" id="user-input" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:border-accent focus:outline-none transition-colors" placeholder="Masukkan ID / Username...">
                    <p class="text-[10px] text-white/30 mt-2 italic">*Pastikan data benar ya..</p>
                </div>

                <button onclick="App.processOrder()" class="w-full bg-accent hover:bg-accent/80 text-white font-bold py-4 rounded-xl active-scale transition-transform flex justify-center items-center gap-2">
                    <span>KIRIM PESANAN</span>
                    <i class="fa-solid fa-paper-plane text-xs"></i>
                </button>
                
                <button onclick="document.getElementById('order-modal').classList.add('hidden')" class="w-full text-xs font-bold text-white/30 py-2">
                    BATALKAN
                </button>
            </div>
        </div>
    </div>

    <script>
        // CONFIG
        const CONFIG = {
            wa_number: "6285885961576", // NOMOR WA TUAN DI SINI
            admin_mode: true
        };

        // DATABASE PRODUK
        const DB = {
            panel: [
                { ram: "1GB", price: "2.500", cpu: "50%", disk: "1024 MB" },
                { ram: "2GB", price: "4.000", cpu: "80%", disk: "2048 MB" },
                { ram: "3GB", price: "6.000", cpu: "100%", disk: "3072 MB" },
                { ram: "4GB", price: "7.000", cpu: "120%", disk: "4096 MB" },
                { ram: "5GB", price: "8.000", cpu: "150%", disk: "5120 MB" },
                { ram: "6GB", price: "9.000", cpu: "180%", disk: "6144 MB" },
                { ram: "7GB", price: "10.000", cpu: "200%", disk: "7168 MB" },
                { ram: "8GB", price: "11.000", cpu: "250%", disk: "8192 MB" },
                { ram: "9GB", price: "12.000", cpu: "300%", disk: "9216 MB" },
                { ram: "10GB", price: "13.000", cpu: "350%", disk: "10240 MB" },
                { ram: "15GB", price: "15.000", cpu: "Unlimited", disk: "15360 MB" },
            ],
            vps: [
                { name: "RAM 8GB Core 4", price: "5.000" },
                { name: "RAM 16GB Core 4", price: "10.000" },
                { name: "RAM 16GB Core 8", price: "15.000" },
                { name: "RAM 32GB Core 8", price: "30.000" },
            ],
            bot: [
                { name: "Sewa 1 Bulan", price: "5.000" },
                { name: "Sewa 2 Bulan", price: "10.000" },
                { name: "Sewa 3 Bulan", price: "15.000" },
                { name: "Sewa 4 Bulan", price: "20.000" },
                { name: "Sewa Permanen", price: "30.000" },
            ],
            topup: [
                { id: 'ml', name: 'Mobile Legends', icon: 'fa-shield-halved' },
                { id: 'ff', name: 'Free Fire', icon: 'fa-fire' },
                { id: 'pubg', name: 'PUBG Mobile', icon: 'fa-crosshairs' },
                { id: 'genshin', name: 'Genshin Impact', icon: 'fa-star' },
            ],
            // LIST ITEMS GAME (SIMULASI LENGKAP)
            game_items: {
                ml: [
                    { name: "86 Diamonds", price: "20.000" },
                    { name: "172 Diamonds", price: "40.000" },
                    { name: "257 Diamonds", price: "60.000" },
                    { name: "Weekly Pass", price: "28.000" },
                    { name: "Twilight Pass", price: "150.000" },
                ],
                ff: [
                    { name: "70 Diamonds", price: "10.000" },
                    { name: "140 Diamonds", price: "20.000" },
                    { name: "355 Diamonds", price: "50.000" },
                    { name: "Membership Weekly", price: "30.000" },
                ],
                pubg: [
                    { name: "60 UC", price: "15.000" },
                    { name: "325 UC", price: "65.000" },
                    { name: "660 UC", price: "130.000" },
                ],
                genshin: [
                    { name: "60 Genesis", price: "16.000" },
                    { name: "Welkin Moon", price: "79.000" },
                ]
            }
        };

        // APP LOGIC
        const App = {
            currentSelection: null,

            init() {
                this.show('panel');
            },

            reset() {
                this.show('panel');
            },

            show(category) {
                const container = document.getElementById('content-area');
                let content = '';
                
                // HEADER CATEGORY
                const headers = {
                    panel: "PTERODACTYL HOSTING PANEL",
                    vps: "DIGITAL OCEAN DROPLET",
                    bot: "SEWA BOT WHATSAPP",
                    topup: "TOPUP GAME CENTER"
                };

                content += `<h3 class="text-xs font-bold text-white/30 mb-4 tracking-widest uppercase border-b border-white/10 pb-2">${headers[category]}</h3>`;
                content += `<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">`;

                // RENDER LOGIC
                if(category === 'panel') {
                    content += DB.panel.map(item => `
                        <div class="glass-card p-5 rounded-2xl relative overflow-hidden group">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <h4 class="text-xl font-bold text-white">RAM ${item.ram}</h4>
                                    <p class="text-accent font-mono text-sm">Rp ${item.price}</p>
                                </div>
                                <div class="w-8 h-8 rounded-full bg-white/5 flex items-center justify-center text-white/50">
                                    <i class="fa-solid fa-server"></i>
                                </div>
                            </div>
                            <ul class="text-[10px] text-white/50 space-y-1 mb-4">
                                <li>✅ CPU ${item.cpu} Turbo</li>
                                <li>✅ Disk ${item.disk} NVMe</li>
                                <li>✅ Anti-DDoS Path</li>
                                <li>✅ Uptime 99% Garansi</li>
                            </ul>
                            <button onclick="App.openModal('Panel ${item.ram}', '${item.price}', 'username')" class="w-full py-2 rounded-lg bg-white/5 hover:bg-accent text-xs font-bold transition-colors">ORDER NOW</button>
                        </div>
                    `).join('');
                } 
                else if(category === 'vps') {
                    content += DB.vps.map(item => `
                        <div class="glass-card p-5 rounded-2xl border-l-4 border-pink-500">
                            <h4 class="font-bold text-white">${item.name}</h4>
                            <p class="text-pink-400 font-mono font-bold text-lg my-2">Rp ${item.price}</p>
                            <button onclick="App.openModal('${item.name}', '${item.price}', 'email')" class="w-full py-2 mt-2 rounded-lg bg-pink-500/10 text-pink-500 hover:bg-pink-500 hover:text-white text-xs font-bold transition-colors">DEPLOY DROPLET</button>
                        </div>
                    `).join('');
                }
                else if(category === 'bot') {
                    content += DB.bot.map(item => `
                        <div class="glass-card p-4 rounded-xl flex justify-between items-center">
                            <div>
                                <h4 class="font-bold text-sm text-white">${item.name}</h4>
                                <p class="text-green-400 text-xs">Rp ${item.price}</p>
                            </div>
                            <button onclick="App.openModal('${item.name}', '${item.price}', 'link_group')" class="px-4 py-2 rounded-lg bg-green-500 text-black text-[10px] font-bold">SEWA</button>
                        </div>
                    `).join('');
                }
                else if(category === 'topup') {
                    content += DB.topup.map(game => `
                        <div onclick="App.loadGameItems('${game.id}')" class="glass-card p-6 rounded-2xl flex flex-col items-center justify-center gap-3 cursor-pointer hover:bg-white/5 transition-colors">
                            <div class="text-3xl text-blue-400"><i class="fa-solid ${game.icon}"></i></div>
                            <h4 class="font-bold text-sm text-white uppercase">${game.name}</h4>
                        </div>
                    `).join('');
                }

                content += `</div>`;
                container.innerHTML = content;
            },

            loadGameItems(gameId) {
                const items = DB.game_items[gameId];
                const gameName = DB.topup.find(g => g.id === gameId).name;
                const container = document.getElementById('content-area');

                let html = `
                    <div class="flex items-center gap-2 mb-4 cursor-pointer" onclick="App.show('topup')">
                        <i class="fa-solid fa-arrow-left text-xs"></i>
                        <span class="text-xs font-bold uppercase">Kembali</span>
                    </div>
                    <h3 class="text-lg font-bold text-white mb-4 neon-text">${gameName}</h3>
                    <div class="grid grid-cols-2 gap-3">
                `;

                html += items.map(item => `
                    <div onclick="App.openModal('${gameName} - ${item.name}', '${item.price}', 'game_id')" class="glass-card p-4 rounded-xl text-center cursor-pointer border hover:border-blue-400 transition-colors">
                        <p class="text-xs font-bold text-white mb-1">${item.name}</p>
                        <p class="text-blue-400 font-mono text-sm">Rp ${item.price}</p>
                    </div>
                `).join('');

                html += `</div>`;
                container.innerHTML = html;
            },

            openModal(item, price, inputType) {
                const modal = document.getElementById('order-modal');
                this.currentSelection = { item, price };
                
                document.getElementById('modal-title').innerText = item;
                document.getElementById('modal-price').innerText = `Rp ${price}`;
                
                const input = document.getElementById('user-input');
                if(inputType === 'username') input.placeholder = "Masukkan Username Panel (Huruf Kecil)";
                else if(inputType === 'email') input.placeholder = "Masukkan Email untuk VPS";
                else if(inputType === 'link_group') input.placeholder = "Link Group WhatsApp";
                else input.placeholder = "Masukkan User,User ID, Zone ID";

                modal.classList.remove('hidden');
                modal.classList.add('flex');
            },

            processOrder() {
                const input = document.getElementById('user-input').value;
                if(!input) return alert("Diisi dulu ya datanya..");

                const { item, price } = this.currentSelection;
                
                let text = `*Halo Admin RENN MODZ* 👋\n\n`;
                text += `Saya mau order:\n`;
                text += `📦 *Item:* ${item}\n`;
                text += `💰 *Harga:* Rp ${price}\n`;
                text += `📝 *Data:* ${input}\n\n`;
                text += `Mohon segera diproses ya..`;

                const url = `https://wa.me/${CONFIG.wa_number}?text=${encodeURIComponent(text)}`;
                window.open(url, '_blank');
            }
        };

        // START
        window.onload = () => App.init();
    </script>
</body>
</html>
